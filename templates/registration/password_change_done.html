{% extends 'base.html' %}
{% block title %}Contraseña actualizada{% endblock %}
{% block page_title %}Contraseña actualizada{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-success">
            <div class="card-body p-4 text-center">
                <div class="mb-3">
                    <i class="fas fa-check-circle text-success" style="font-size: 4rem;"></i>
                </div>
                <h5 class="card-title">Su contraseña ha sido cambiada correctamente.</h5>
                <p class="text-muted mb-4">La próxima vez que inicie sesión use la nueva contraseña.</p>
                <a href="{% url 'dashboard' %}" class="btn btn-primary">
                    <i class="fas fa-home me-2"></i>Ir al inicio
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
